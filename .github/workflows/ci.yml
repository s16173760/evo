name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  version-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Assert CLI and plugin manifest versions match
        run: python3 scripts/check_versions.py

  cli-wheel-assets:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install build tooling
        run: python -m pip install --upgrade pip build
      - name: Build sdist + wheel
        working-directory: plugins/evo
        run: python -m build
      - name: Verify dashboard assets are in the wheel
        working-directory: plugins/evo
        run: |
          python - <<'PY'
          import glob, sys, zipfile
          required = {"evo/static/index.html", "evo/static/app.js", "evo/static/style.css"}
          whls = glob.glob("dist/*.whl")
          assert whls, "no wheel built"
          whl = whls[0]
          with zipfile.ZipFile(whl) as z:
              names = set(z.namelist())
          missing = required - names
          if missing:
              sys.exit(f"missing in {whl}: {sorted(missing)}")
          print(f"ok: all static assets present in {whl}")
          PY
      - name: Smoke-test installed CLI
        working-directory: plugins/evo
        run: |
          python -m venv "$RUNNER_TEMP/smoke"
          if [ "$RUNNER_OS" = "Windows" ]; then
            VENV_BIN="$RUNNER_TEMP/smoke/Scripts"
          else
            VENV_BIN="$RUNNER_TEMP/smoke/bin"
          fi
          "$VENV_BIN/python" -m pip install dist/*.whl
          "$VENV_BIN/evo" --version
          "$VENV_BIN/python" -c "from evo import dashboard; from pathlib import Path; p = Path(dashboard.__file__).parent / 'static' / 'index.html'; assert p.exists(), p"

  sdk-python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install build tooling
        run: python -m pip install --upgrade pip build
      - name: Build sdist + wheel
        working-directory: sdk/python
        run: python -m build
      - name: Install built wheel
        working-directory: sdk/python
        run: python -m pip install dist/*.whl
      - name: Run SDK tests
        run: python sdk/python/test/test_run.py

  sdk-node:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["18", "20", "22", "24"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Run SDK tests
        working-directory: sdk/node
        run: npm test

  unit-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v3
      - name: Configure git for tests (author + default branch)
        run: |
          git config --global user.email "ci@evo.test"
          git config --global user.name "evo-ci"
          git config --global init.defaultBranch main
      - name: Install plugin (editable, pulls portalocker + flask + pyyaml) + pytest
        run: |
          python -m pip install -e plugins/evo
          python -m pip install pytest
      - name: Run unit tests
        run: pytest tests/unit/ -q
