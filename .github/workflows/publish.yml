name: publish

# Triggered by pushing a tag matching v*.
# - v0.1.0       -> publishes both SDKs AND the CLI at 0.1.0
# - py-v0.1.0    -> publishes only the Python SDK
# - node-v0.1.0  -> publishes only the Node SDK
# - cli-v0.1.0   -> publishes only the CLI (evo-hq-cli)
#
# The tag version must match the version in the corresponding package
# manifest (sdk/python/pyproject.toml, sdk/node/package.json, or
# plugins/evo/pyproject.toml).

on:
  push:
    tags:
      - "v*"
      - "py-v*"
      - "node-v*"
      - "cli-v*"
  workflow_dispatch:
    inputs:
      target:
        description: What to publish
        required: true
        type: choice
        options: [all, python, node, cli]
        default: all

jobs:
  preflight:
    # Single gate. If this fails, no package publishes -- atomic release.
    # Catches: missed version pins (caught alpha.8 mismatch post-mortem),
    # unit-test regressions (would block any tag where main is red).
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v3
      - name: Configure git for tests (author + default branch)
        run: |
          git config --global user.email "ci@evo.test"
          git config --global user.name "evo-ci"
          # Some e2e tests `git init --bare` and expect `main` as the default;
          # ubuntu-latest's git defaults to `master`.
          git config --global init.defaultBranch main
      - name: Verify all 7 version pins agree
        run: python3 scripts/check_versions.py
      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF##*/}"
          VERSION=$(python3 scripts/check_versions.py | sed -n 's/^OK: all 7 sources report version //p')
          if [ "$TAG" != "v${VERSION}" ]; then
            echo "Tag $TAG does not match package version $VERSION (expected v${VERSION})"
            exit 1
          fi
      - name: Install plugin + pytest
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e plugins/evo
          python -m pip install pytest
      - name: Run unit tests
        run: pytest tests/unit/ -q
      - name: Run e2e tests
        # The e2e tests are runnable as scripts (they take custom positional
        # args, not pytest fixtures). Skip test_integ_localhost.py because it
        # downloads a sandbox-agent binary at runtime.
        run: |
          python tests/e2e/test_e2e.py
          python tests/e2e/test_e2e_lineage.py
          python tests/e2e/test_e2e_pool.py

  publish-python:
    needs: preflight
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      startsWith(github.ref, 'refs/tags/py-v') ||
      (github.event_name == 'workflow_dispatch' && (inputs.target == 'all' || inputs.target == 'python'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine
      - name: Build sdist + wheel
        working-directory: sdk/python
        run: python -m build
      - name: Verify tag matches package version
        working-directory: sdk/python
        run: |
          TAG="${GITHUB_REF##*/}"
          VERSION=$(python -c "import tomllib,sys; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          case "$TAG" in
            v*)    EXPECTED="v${VERSION}" ;;
            py-v*) EXPECTED="py-v${VERSION}" ;;
            *)     EXPECTED="" ;;
          esac
          if [ -n "$EXPECTED" ] && [ "$TAG" != "$EXPECTED" ]; then
            echo "Tag $TAG does not match pyproject version $VERSION (expected $EXPECTED)"
            exit 1
          fi
      - name: Check distribution metadata
        working-directory: sdk/python
        run: twine check dist/*
      - name: Publish to PyPI
        working-directory: sdk/python
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload --non-interactive dist/*

  publish-node:
    needs: preflight
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      startsWith(github.ref, 'refs/tags/node-v') ||
      (github.event_name == 'workflow_dispatch' && (inputs.target == 'all' || inputs.target == 'node'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Verify tag matches package version
        working-directory: sdk/node
        run: |
          TAG="${GITHUB_REF##*/}"
          VERSION=$(node -p "require('./package.json').version")
          case "$TAG" in
            v*)      EXPECTED="v${VERSION}" ;;
            node-v*) EXPECTED="node-v${VERSION}" ;;
            *)       EXPECTED="" ;;
          esac
          if [ -n "$EXPECTED" ] && [ "$TAG" != "$EXPECTED" ]; then
            echo "Tag $TAG does not match package.json version $VERSION (expected $EXPECTED)"
            exit 1
          fi
      - name: Run tests
        working-directory: sdk/node
        run: npm test
      - name: Publish to npm
        working-directory: sdk/node
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Pre-release semver (e.g. 0.4.0-alpha.1, 0.4.0-rc.1) ships under
          # the `alpha` dist-tag. Without this, `npm publish` would update
          # `latest`, and existing stable users running `npm install
          # @evo-hq/evo-agent` would silently get the pre-release.
          VERSION=$(node -p "require('./package.json').version")
          if echo "$VERSION" | grep -q '-'; then
            npm publish --tag alpha
          else
            npm publish
          fi

  publish-cli:
    needs: preflight
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      startsWith(github.ref, 'refs/tags/cli-v') ||
      (github.event_name == 'workflow_dispatch' && (inputs.target == 'all' || inputs.target == 'cli'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Assert CLI and plugin manifest versions match
        run: python3 scripts/check_versions.py
      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine
      - name: Build sdist + wheel
        working-directory: plugins/evo
        run: python -m build
      - name: Verify tag matches package version
        working-directory: plugins/evo
        run: |
          TAG="${GITHUB_REF##*/}"
          VERSION=$(python -c "import tomllib,sys; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          case "$TAG" in
            v*)     EXPECTED="v${VERSION}" ;;
            cli-v*) EXPECTED="cli-v${VERSION}" ;;
            *)      EXPECTED="" ;;
          esac
          if [ -n "$EXPECTED" ] && [ "$TAG" != "$EXPECTED" ]; then
            echo "Tag $TAG does not match pyproject version $VERSION (expected $EXPECTED)"
            exit 1
          fi
      - name: Check distribution metadata
        working-directory: plugins/evo
        run: twine check dist/*
      - name: Verify dashboard assets are in the wheel
        working-directory: plugins/evo
        run: |
          whl=$(ls dist/*.whl)
          for f in evo/static/index.html evo/static/app.js evo/static/style.css; do
            unzip -l "$whl" | awk '{print $NF}' | grep -qx "$f" || {
              echo "missing $f in $whl"; exit 1;
            }
          done
      - name: Publish to PyPI
        working-directory: plugins/evo
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload --non-interactive dist/*

  release-smoke:
    # Verify the artifacts we just published actually work for a fresh
    # user — install evo-hq-cli from PyPI, install host CLIs from npm /
    # curl-installer, install skills from GitHub via `npx skills add`,
    # then run the full evo flow against a fixture repo with a mid-run
    # `evo direct` injection. Asserts subagents fired, the directive was
    # consumed, and the score beat baseline.
    #
    # Reactive, not gating: artifacts are already published by the time
    # this runs. Failure here means "what we just released is broken" —
    # not "block the release" (too late).
    #
    # Skipped for per-SDK tags (py-v*, node-v*) since those don't change
    # evo-hq-cli, which is what the smoke installs from PyPI.
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      startsWith(github.ref, 'refs/tags/cli-v')
    needs: [publish-cli]
    runs-on: ubuntu-latest
    # Each host run can take 5-10 min (codex slow, opencode + openclaw
    # ~7 min on 4G sandboxes). Five in parallel → wall time is the
    # slowest host. 30 min is a safety upper bound that lets a misbehaving
    # host's fail-fast / timeout fire cleanly without burning CI.
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Resolve version from tag
        id: version
        run: |
          TAG="${GITHUB_REF##*/}"
          VERSION="${TAG#cli-v}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Wait for evo-hq-cli to be queryable on PyPI
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "Polling PyPI for evo-hq-cli==$VERSION (publish job just finished)..."
          for i in $(seq 1 30); do
            if pip index versions evo-hq-cli 2>/dev/null | grep -q "$VERSION"; then
              echo "Found evo-hq-cli==$VERSION on PyPI"
              break
            fi
            echo "  attempt $i: not yet, sleeping 10s..."
            sleep 10
          done
      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-xdist 'e2b>=2.20'
      - name: Verify the evo-test-4g sandbox template exists
        # opencode + openclaw tests use the `evo-test-4g` e2b template
        # (default 1GB OOM-kills the agent + skills + plugin combo).
        # Build the template once per e2b account; this step surfaces a
        # clear error if the secret's account doesn't have it.
        if: env.E2B_API_KEY != ''
        env:
          E2B_API_KEY: ${{ secrets.E2B_API_KEY }}
        run: |
          python - <<'PY'
          import os, sys
          try:
              from e2b import Sandbox
          except ImportError:
              sys.exit("e2b SDK not installed")
          try:
              sbx = Sandbox.create(template="evo-test-4g", timeout=60)
              sbx.kill()
              print("evo-test-4g template found")
          except Exception as e:
              print(f"::error::evo-test-4g template missing or inaccessible: {e}")
              print("Build it once per e2b account via:")
              print("  Template.build(Template().from_ubuntu_image('22.04'),")
              print("                 name='evo-test-4g', memory_mb=4096, cpu_count=2)")
              sys.exit(1)
          PY
      - name: Run release smoke (5 hosts in parallel)
        env:
          EVO_LIVE_TEST_RELEASE_SMOKE: "1"
          EVO_RELEASE_SMOKE_VERSION: ${{ steps.version.outputs.version }}
          E2B_API_KEY: ${{ secrets.E2B_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$E2B_API_KEY" ]; then
            echo "::warning::E2B_API_KEY not set; release smoke is a no-op"
            echo "  Add it at Settings → Secrets → Actions to enable post-release verification."
            exit 0
          fi
          # `-n 5`: each host gets its own pytest-xdist worker = its own
          # sandbox. 5 sandboxes burn in parallel; total wall time is the
          # slowest single host, not the sum. tests with no API key for
          # their host (e.g. ANTHROPIC_API_KEY missing) skip cleanly.
          #
          # `--maxfail=0`: don't stop on first failure — surface results
          # for all 5 hosts in one CI run. `-ra`: short test summary at
          # the end. `--tb=short`: skip noisy framework frames.
          pytest tests/live/test_release_smoke.py -v -s -n 5 \
            --dist=loadgroup --maxfail=0 -ra --tb=short

  github-release:
    # Only run on the unified `v*` tag form (full release of all packages).
    # Skip for per-package tags (py-v*, node-v*, cli-v*) since those aren't
    # the user-facing release surface.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [publish-python, publish-node, publish-cli]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need history + tags for `git log <prev>..<curr>`
      - name: Build release notes from commit log
        id: notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF##*/}"

          # Find the previous v* tag (excluding this one). If none exists,
          # walk back to the repo's first commit.
          PREV=$(git tag --list 'v*' --sort=-version:refname \
                 | grep -v "^${TAG}$" | head -n 1 || true)
          if [ -z "$PREV" ]; then
            RANGE=""
          else
            RANGE="${PREV}..${TAG}"
          fi

          {
            echo "## What changed"
            echo
            # One bullet per non-merge, non-bump commit.
            git log $RANGE --no-merges --format="- %s" \
              | grep -vE '^- (release: bump|Bump release|Align alpha release)' \
              || echo "- (no substantive commits since previous release)"
            echo
            if [ -n "$PREV" ]; then
              echo "**Full diff**: https://github.com/${GITHUB_REPOSITORY}/compare/${PREV}...${TAG}"
            fi
          } > /tmp/release-notes.md

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          # Pre-release if the version has a hyphen (alpha/beta/rc).
          if echo "$TAG" | grep -q '-'; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.notes.outputs.tag }}"
          PRERELEASE_FLAG=""
          if [ "${{ steps.notes.outputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          # If a release for this tag already exists (manual creation), update its
          # body in place; otherwise create it.
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --notes-file /tmp/release-notes.md
          else
            gh release create "$TAG" --title "$TAG" --notes-file /tmp/release-notes.md $PRERELEASE_FLAG
          fi
